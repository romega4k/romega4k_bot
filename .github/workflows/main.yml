name: Ro Mega 4K - Notificari Telegram

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  notify:
    name: Trimite notificari Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instaleaza dependente
        run: npm install

      - name: Ruleaza botul
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node bot.js
